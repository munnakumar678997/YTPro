name: Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build
      run: cmd.exe /c gradlew.bat assembleRelease

    - name: Sign
      run: cmd.exe /c java.exe -jar "signer\ApkSigner.jar" sign --key "signer\apkeasytool.pk8" --cert "signer\apkeasytool.pem" --v4-signing-enabled false --out "%cd%/app/build/outputs/apk/release/YTPro.apk" "%cd%/app/build/outputs/apk/release/app-release-unsigned.apk"

    - name: Verify APK exists
      shell: bash
      run: ls -la app/build/outputs/apk/release/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YTPRO
        path: app/build/outputs/apk/release/YTPro.apk

    - name: Release APK
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: ncipollo/release-action@v1
      with:
        tag: latest
        name: "YT PRO - Latest Build"
        body: |
          ## YT PRO — Latest Build

          **Package:** com.munna.ytpro

          ### How to install
          1. Click **YTPro.apk** below to download
          2. Open the downloaded file on your Android phone
          3. Tap Install (allow "Unknown sources" if asked)

          ### Features
          AdBlocker · Video Downloader · Background Play · PiP · Google Gemini · Gesture Controls · Return Dislikes · SponsorBlock · 10x Speed
        artifacts: app/build/outputs/apk/release/YTPro.apk
        allowUpdates: true
        removeArtifacts: true
        makeLatest: true
        token: ${{ secrets.GITHUB_TOKEN }}
