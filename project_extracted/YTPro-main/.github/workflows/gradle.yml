name: Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build
      run: cmd.exe /c gradlew.bat assembleRelease

    - name: Sign
      run: cmd.exe /c java.exe -jar "signer\ApkSigner.jar" sign --key "signer\apkeasytool.pk8" --cert "signer\apkeasytool.pem" --v4-signing-enabled false --out "%cd%/app/build/outputs/apk/release/YTPro.apk" "%cd%/app/build/outputs/apk/release/app-release-unsigned.apk"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YTPRO
        path: app/build/outputs/apk/release/YTPro.apk

    - name: Delete old release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: gh release delete latest --yes --cleanup-tag
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        gh release create latest "app/build/outputs/apk/release/YTPro.apk" ^
          --title "YT PRO - Latest Build" ^
          --notes "## YT PRO - Latest Build##Install##Download the APK file and open it on your Android phone to install." ^
          --latest
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
