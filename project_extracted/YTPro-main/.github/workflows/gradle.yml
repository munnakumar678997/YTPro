name: Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build
      run: cmd.exe /c gradlew.bat assembleRelease

    - name: Sign
      run: cmd.exe /c java.exe -jar "signer\ApkSigner.jar" sign --key "signer\apkeasytool.pk8" --cert "signer\apkeasytool.pem" --v4-signing-enabled false --out "%cd%/app/build/outputs/apk/release/youtube_pro_signed.apk" "%cd%/app/build/outputs/apk/release/app-release-unsigned.apk"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YTPRO
        path: app/build/outputs/apk/release/youtube_pro_signed.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: YT PRO Latest Build
        body: |
          ## YT PRO — Latest Build

          ### Install
          Download the APK below and install it on your Android phone.

          ### Features
          - Ads Blocker
          - Video & Shorts Downloader
          - Background Audio Player
          - Picture in Picture Mode
          - Google Gemini AI Summary
          - Gesture Controls (Volume & Brightness)
          - Return YouTube Dislike
          - Skip Sponsors (SponsorBlock)
          - 10x Speed Control
          - Hide Shorts
          - And much more!
        files: app/build/outputs/apk/release/youtube_pro_signed.apk
        make_latest: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
